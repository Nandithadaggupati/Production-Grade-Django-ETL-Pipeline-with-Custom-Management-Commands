services:
  postgres:
    image: postgres:14
    container_name: cdc-postgres
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: cdc_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cdc_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: cdc-meilisearch
    environment:
      MEILI_MASTER_KEY: meili_master_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  cdc-consumer:
    build:
      context: ./cdc-consumer
      dockerfile: Dockerfile
    container_name: cdc-consumer
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: cdc_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: meili_master_key
      API_URL: http://api:8000
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    volumes:
      - cdc_checkpoint_data:/app/checkpoint
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: cdc-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cdc_checkpoint_data:
